name: Android Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install NDK
        run: sdkmanager "ndk;25.2.9519653"

      - name: Build APK
        run: |
          # This tells the robot to compile using the Android tools
          # Note: In a real project, we'd trigger a Gradle build here
          echo "Compiling CyberCommander for Android..."
         
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: CyberCommander-APK
          path: . # We will point this to the final file once compiled

 
